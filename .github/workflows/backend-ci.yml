name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:///./ci_lifelight_lab.db
      VECTOR_ENABLED: false
      API_KEY: test-api-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ruff
        run: make lint

      - name: Pytest
        run: make test

      - name: Docker build
        run: docker build -t lifelight-memory-lab:ci .
